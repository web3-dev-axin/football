}

type Query {
  market(marketId: String!): market
  markets(where: marketFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): marketPage!
  trade(id: String!): trade
  trades(where: tradeFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): tradePage!
  redemption(id: String!): redemption
  redemptions(where: redemptionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): redemptionPage!
