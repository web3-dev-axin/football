  resultProposals(where: resultProposalFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): resultProposalPage!
  position(marketAddress: String!, trader: String!, outcomeIndex: Float!): position
  positions(where: positionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): positionPage!
  _meta: Meta
}

